<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>HK360</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #EEF2F7;
    }

    /* Loader */
    #loader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #EEF2F7;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }

    .logo {
      font-size: 28px;
      font-weight: 600;
      color: #2F3A4A;
      margin-bottom: 10px;
    }

    .loader-bar {
      width: 120px;
      height: 4px;
      background: #1E5EFF;
      border-radius: 2px;
      animation: load 1.2s infinite ease-in-out;
    }

    @keyframes load {
      0% { transform: scaleX(0.3); opacity: 0.5; }
      50% { transform: scaleX(1); opacity: 1; }
      100% { transform: scaleX(0.3); opacity: 0.5; }
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>

<body>

  <!-- LOADING -->
  <div id="loader">
    <div class="logo">HK360</div>
    <div class="loader-bar"></div>
  </div>

  <!-- SISTEMA -->
  <iframe 
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbxS_K0ClX7vAKo8IpUDM37k9V2vrSrLmxlg6Fq2nSHpNm6V_XRlMFHxVS0TeD1fJZzJ/exec">
  </iframe>

  <script>
    const iframe = document.getElementById('appFrame');
    const loader = document.getElementById('loader');

    iframe.onload = () => {
      loader.style.display = 'none';
    };
  </script>

</body>
</html>
